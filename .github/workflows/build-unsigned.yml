name: Build Unsigned iOS App (OpenClaw)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Node.js（无需 pnpm action）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 安装 xcodegen
      - name: Install xcodegen
        run: brew install xcodegen

      # 准备 iOS 项目：先安装 pnpm（全局），然后执行项目脚本
      - name: Prepare iOS project
        run: |
          # 通过 npm 全局安装 pnpm，并确保其路径加入 PATH
          npm install -g pnpm
          # 将 npm 全局 bin 目录加入当前 shell 的 PATH
          export PATH="$(npm config get prefix)/bin:$PATH"
          # 验证 pnpm 是否可用
          pnpm --version

          chmod +x ./scripts/ios-configure-signing.sh
          pnpm install
          ./scripts/ios-configure-signing.sh
          cd apps/ios
          xcodegen generate

      - name: List schemes
        run: |
          cd apps/ios
          xcodebuild -list -project OpenClaw.xcodeproj

      - name: Build archive
        run: |
          cd apps/ios
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -archivePath $PWD/build/OpenClaw.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          cd apps/ios
          mkdir -p build/ipa Payload
          cp -r build/OpenClaw.xcarchive/Products/Applications/OpenClaw.app Payload/
          cd Payload && zip -r ../build/ipa/OpenClaw.ipa * && cd ..
          ls -la build/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned.ipa
          path: apps/ios/build/ipa/OpenClaw.ipa
